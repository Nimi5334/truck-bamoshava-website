<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>עריכת האתר · Leverage CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1216; --panel:#171c22; --panel-2:#1f262e; --line:#2a323c;
  --ink:#e8edf2; --ink-soft:#9aa7b4; --accent:#4f9cf0; --accent-2:#2f7fd6;
  --ok:#3ec06a; --warn:#e0a93b; --err:#e5614e; --radius:12px;
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:"Assistant",system-ui,sans-serif;font-size:15px;line-height:1.5;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}
a{color:var(--accent)}

/* ---- login ---- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:28px}
.login-card{width:min(380px,100%)}
.login-card h1{font-size:1.3rem;margin:0 0 4px}
.login-card p{color:var(--ink-soft);margin:0 0 20px;font-size:.92rem}

/* ---- layout ---- */
.topbar{
  position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);
}
.topbar .title{font-weight:700}
.topbar .site-id{color:var(--ink-soft);font-size:.85rem}
.topbar .spacer{flex:1}
.status-msg{font-size:.85rem;color:var(--ink-soft);min-height:1em}
.status-msg.ok{color:var(--ok)} .status-msg.err{color:var(--err)} .status-msg.warn{color:var(--warn)}

.shell{display:grid;grid-template-columns:1fr;gap:0}
.shell.with-preview{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
.editor{padding:20px;max-width:760px;margin-inline:auto;width:100%}
.preview-pane{border-inline-start:1px solid var(--line);height:calc(100vh - 53px);position:sticky;top:53px}
.preview-pane iframe{width:100%;height:100%;border:0;background:#fff}

/* ---- panels ---- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.panel>summary{
  list-style:none;cursor:pointer;padding:14px 18px;font-weight:700;
  display:flex;align-items:center;gap:10px;user-select:none;
}
.panel>summary::-webkit-details-marker{display:none}
.panel>summary::before{content:"▸";color:var(--ink-soft);transition:transform .15s}
.panel[open]>summary::before{transform:rotate(-90deg)}
.panel .panel-body{padding:4px 18px 18px}

/* ---- fields ---- */
.field{margin:12px 0}
.field label{display:block;font-size:.85rem;color:var(--ink-soft);margin-bottom:5px}
.field input[type=text],.field textarea,.field select{
  width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:9px 11px;
}
.field textarea{resize:vertical;min-height:74px}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--accent);border-color:transparent}
.field .hint{color:var(--ink-soft);font-size:.78rem;margin-top:3px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}

/* ---- repeater ---- */
.repeater-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin:10px 0;background:var(--panel-2)}
.repeater-item .item-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.repeater-item .item-head .grip{color:var(--ink-soft);font-size:.8rem;flex:1}
.btn{
  border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
  border-radius:8px;padding:8px 14px;font-size:.85rem;
}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.btn-primary:hover{background:var(--accent-2)}
.btn-sm{padding:4px 9px;font-size:.78rem}
.btn-danger:hover{border-color:var(--err);color:var(--err)}
.btn-add{width:100%;border-style:dashed;margin-top:6px}
.icon-btns{display:flex;gap:5px}

/* ---- toggles, swatches ---- */
.toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:.85rem}
.toggle input{width:16px;height:16px}
.swatch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.swatch{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
.swatch input[type=color]{width:34px;height:34px;border:0;background:none;padding:0;border-radius:6px;cursor:pointer}
.swatch .sw-label{font-size:.8rem;color:var(--ink-soft)}
.thumb{width:54px;height:54px;object-fit:contain;background:var(--panel-2);border:1px solid var(--line);border-radius:8px}
.hours-grid{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:6px 10px;align-items:center;font-size:.82rem}
.hours-grid .day{color:var(--ink-soft)}
.hours-grid input[type=number]{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:6px}
.section-type{font-size:.72rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
.savebar{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);padding:12px 20px;display:flex;gap:12px;align-items:center}
.muted{color:var(--ink-soft)}
.tag-pick{display:inline-flex;gap:10px;flex-wrap:wrap}
.hide{display:none !important}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="app.js"></script>
</body>
</html>
