name = "leverage-cms"
main = "src/index.mjs"
compatibility_date = "2024-11-01"

# Public var — the exact admin origin allowed by CORS. Override per deploy.
[vars]
ALLOWED_ORIGIN = "https://admin.leverage.example"

# KV namespaces. Create with:
#   wrangler kv namespace create CLIENTS
#   wrangler kv namespace create RATE
# then paste the returned ids below.
[[kv_namespaces]]
binding = "CLIENTS"
id = "REPLACE_WITH_CLIENTS_KV_ID"

[[kv_namespaces]]
binding = "RATE"
id = "REPLACE_WITH_RATE_KV_ID"

# Secrets are NOT stored here. Set them with:
#   wrangler secret put GH_APP_ID
#   wrangler secret put GH_APP_PRIVATE_KEY      # paste the PEM (PKCS#8)
#   wrangler secret put JWT_SIGNING_SECRET      # a long random string
